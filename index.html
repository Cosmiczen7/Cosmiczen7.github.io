<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Aero Portfolio</title>
    <style>
        /* 1. The Frutiger Aero Background */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0072ff 0%, #00c6ff 50%, #56ab2f 100%);
            background-attachment: fixed;
            overflow: hidden;
        }

        /* 2. The Core Aero Glass Window Frame */
        .aero-window {
            width: 550px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.45);
            box-shadow: 
                0 0 0 1px rgba(0, 0, 0, 0.1),
                0 15px 35px rgba(0, 0, 0, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
            /* This creates the frosted blur background effect */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 5px;
            position: relative;
        }

        /* 3. The Glossy Windows 7 Title Bar */
        .title-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px 8px 10px;
            /* Linear gradient mirroring light striking reflective plastic */
            background: linear-gradient(to bottom, 
                rgba(255,255,255,0.3) 0%, 
                rgba(255,255,255,0.1) 50%, 
                rgba(0,0,0,0.05) 51%, 
                rgba(255,255,255,0.1) 100%);
            border-radius: 4px 4px 0 0;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 1px 2px rgba(0,0,0,0.2);
            font-weight: 600;
            color: #1e293b;
        }

        /* 4. Windows 7 Style Minimize/Maximize/Close Buttons */
        .window-controls {
            display: flex;
            gap: 4px;
        }

        .btn {
            width: 28px;
            height: 18px;
            border: 1px solid rgba(0,0,0,0.3);
            border-radius: 3px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.4), rgba(0,0,0,0.1));
            cursor: pointer;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.5);
        }

        .btn-close {
            background: linear-gradient(to bottom, #f87171, #dc2626);
            border: 1px solid #991b1b;
        }

        .btn:hover {
            filter: brightness(1.2);
        }

        /* 5. Clean Interior App Content Container */
        .window-content {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(0, 0, 0, 0.15);
            border-radius: 0 0 4px 4px;
            padding: 25px;
            min-height: 200px;
            color: #334155;
        }

        h1 {
            margin-top: 0;
            color: #0369a1;
            font-size: 24px;
        }

        /* 6. Frutiger Aero Vibrant Glass Accent Button */
        .aero-btn {
            background: linear-gradient(to bottom, #38bdf8 0%, #0284c7 49%, #0369a1 50%, #075985 100%);
            color: white;
            border: 1px solid #0369a1;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(2, 132, 199, 0.4), inset 0 1px 0 rgba(255,255,255,0.4);
            text-shadow: 0 1px 2px rgba(0,0,0,0.4);
            transition: transform 0.1s;
        }

        .aero-btn:hover {
            filter: brightness(1.15);
            box-shadow: 0 6px 15px rgba(2, 132, 199, 0.6), inset 0 1px 0 rgba(255,255,255,0.4);
        }
        
        .aero-btn:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

    <!-- The Reusable Window Component Structure -->
    <div class="aero-window">
        <div class="title-bar">
            <span>Computer - Welcome</span>
            <div class="window-controls">
                <button class="btn"></button>
                <button class="btn"></button>
                <button class="btn btn-close"></button>
            </div>
        </div>
        <div class="window-content">
            <h1>Welcome to my Aero Domain</h1>
            <p>This layout uses advanced CSS <code>backdrop-filter</code> engines to dynamically blur the gradient behind the panel, perfectly recreating the 2007 Windows 7 Aero architecture.</p>
            <br>
            <button class="aero-btn" onclick="alert('System Operational!')">Explore Projects</button>
        </div>
    </div>

</body>
</html>
