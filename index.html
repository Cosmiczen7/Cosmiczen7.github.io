<html>
    <head>
        <title>Website of Ash777!</title>
        <style>
            /* ── full-screen canvas ── */
            body {
                margin: 0;
                min-height: 100vh;
                background-image: url('assets/blue_back.jpg');
                background-size: cover;
                background-position: center;
                background-attachment: fixed;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                font-family: 'Segoe UI', system-ui, sans-serif;
            }

            /* ── frosted glass dashboard ── */
            .dashboard {
                background: rgba(255, 255, 255, 0.12);
                backdrop-filter: blur(14px);
                -webkit-backdrop-filter: blur(14px);
                border: 1px solid rgba(255, 255, 255, 0.2);
                border-radius: 16px;
                padding: 36px 48px;
                text-align: center;
                box-shadow:
                    0 8px 32px rgba(0, 0, 0, 0.1),
                    inset 0 1px 0 rgba(255, 255, 255, 0.25);
            }

            .dashboard h1 {
                font-weight: 500;
                font-size: 1.6rem;
                color: #fff;
                text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
                letter-spacing: 0.3px;
                margin: 0 0 12px;
            }

            /* ── clear glass buttons ── */
            .clear-btn {
                position: relative;
                z-index: 0;
                background: transparent;
                border: 1px solid rgba(255, 255, 255, 0.4);
                border-radius: 999px;
                padding: 12px 32px;
                color: #fff;
                font-family: inherit;
                font-size: 0.95rem;
                cursor: pointer;
                text-shadow: 0 1px 3px rgba(0, 0, 0, 0.25);
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
                transition: box-shadow 0.2s ease, transform 0.2s ease;
            }

            /* background image — pinned to viewport so it aligns with body */
            .clear-btn::before {
                content: '';
                position: absolute;
                inset: 0;
                border-radius: 999px;
                z-index: -2;
                background-image: url('assets/blue_back.jpg');
                background-attachment: fixed;
                background-size: cover;
                background-position: center;
                pointer-events: none;
            }

            /* glass overlay — smooth opacity/color transition */
            .clear-btn::after {
                content: '';
                position: absolute;
                inset: 0;
                border-radius: 999px;
                z-index: -1;
                background: rgba(255, 255, 255, 0.22);
                box-shadow:
                    inset 0 1px 0 rgba(255, 255, 255, 0.7),
                    inset 0 -2px 0 rgba(255, 255, 255, 0.08);
                pointer-events: none;
                transition: background 0.2s ease, box-shadow 0.2s ease;
            }

            .clear-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 22px rgba(0, 0, 0, 0.15);
            }
            .clear-btn:hover::after {
                background: rgba(255, 255, 255, 0.38);
                box-shadow:
                    inset 0 1px 0 rgba(255, 255, 255, 0.85),
                    inset 0 -2px 0 rgba(255, 255, 255, 0.15);
            }

            .clear-btn:active {
                transform: translateY(0);
            }
            .clear-btn:active::after {
                background: rgba(255, 255, 255, 0.16);
            }

            .button-row {
                display: flex;
                gap: 14px;
                justify-content: center;
            }

            a { text-decoration: none; }
        </style>
    </head>
    <body>
        <div class="dashboard">
            <h1>✦ Welcome to Ash777's website ✦</h1>
            <div class="button-row">
                <a href="about.html"><button class="clear-btn">About</button></a>
                <button class="clear-btn">Something</button>
            </div>
        </div>
    </body>
</html>
